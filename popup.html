<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>CU Auto Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 340px;
      min-height: 420px;
      background: #0d1426;
      font-family: 'Inter', system-ui, sans-serif;
      color: #e8eaf0;
      overflow: hidden;
    }

    /* ── Header ───────────────────────────────────── */
    .header {
      background: linear-gradient(135deg, #c0392b 0%, #8e1a0e 100%);
      padding: 18px 20px 16px;
      position: relative;
      overflow: hidden;
    }
    .header::after {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at top right, rgba(255,255,255,0.12) 0%, transparent 60%);
    }
    .header-row {
      display: flex;
      align-items: center;
      gap: 12px;
      position: relative;
      z-index: 1;
    }
    .logo {
      width: 42px;
      height: 42px;
      background: #fff;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 14px;
      color: #c0392b;
      letter-spacing: -0.5px;
      flex-shrink: 0;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }
    .header-text h1 {
      font-size: 15px;
      font-weight: 700;
      color: #fff;
      line-height: 1.2;
    }
    .header-text p {
      font-size: 11px;
      color: rgba(255,255,255,0.75);
      margin-top: 2px;
    }
    .status-badge {
      margin-left: auto;
      font-size: 10px;
      font-weight: 600;
      padding: 3px 9px;
      border-radius: 20px;
      letter-spacing: 0.4px;
      text-transform: uppercase;
      position: relative;
      z-index: 1;
    }
    .status-badge.active   { background: rgba(39,174,96,0.2);  color: #2ecc71; border: 1px solid rgba(46,204,113,0.3); }
    .status-badge.inactive { background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.5); border: 1px solid rgba(255,255,255,0.15); }

    /* ── Body ─────────────────────────────────────── */
    .body {
      padding: 22px 20px 20px;
    }

    .field-group { margin-bottom: 16px; }
    .field-group label {
      display: block;
      font-size: 11.5px;
      font-weight: 600;
      color: #8892a4;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      margin-bottom: 7px;
    }
    .input-wrap {
      position: relative;
    }
    .input-wrap .icon {
      position: absolute;
      left: 13px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 15px;
      opacity: 0.45;
      pointer-events: none;
    }
    .input-wrap input {
      width: 100%;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      padding: 11px 40px 11px 38px;
      font-size: 13.5px;
      font-family: inherit;
      color: #e8eaf0;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
    }
    .input-wrap input::placeholder { color: rgba(255,255,255,0.25); }
    .input-wrap input:focus {
      border-color: rgba(0,210,211,0.55);
      box-shadow: 0 0 0 3px rgba(0,210,211,0.1);
      background: rgba(255,255,255,0.085);
    }
    .toggle-eye {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      font-size: 16px;
      opacity: 0.4;
      transition: opacity 0.15s;
      line-height: 1;
      padding: 2px;
    }
    .toggle-eye:hover { opacity: 0.75; }

    /* ── Sites toggle ─────────────────────────────── */
    .section-title {
      font-size: 11px;
      font-weight: 600;
      color: #8892a4;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      margin-bottom: 10px;
    }
    .sites {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 20px;
    }
    .site-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 9px;
      padding: 9px 13px;
    }
    .site-info { display: flex; align-items: center; gap: 9px; }
    .site-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .site-dot.cuims { background: #e74c3c; }
    .site-dot.lms   { background: #3498db; }
    .site-label { font-size: 12.5px; font-weight: 500; color: #cdd3de; }
    .site-url   { font-size: 10.5px; color: #5a6580; margin-top: 1px; }

    /* Toggle switch */
    .toggle { position: relative; display: inline-block; width: 36px; height: 20px; }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute; inset: 0;
      background: rgba(255,255,255,0.12);
      border-radius: 20px;
      transition: background 0.2s;
      cursor: pointer;
    }
    .slider::before {
      content: '';
      position: absolute;
      width: 14px; height: 14px;
      left: 3px; top: 3px;
      background: #fff;
      border-radius: 50%;
      transition: transform 0.2s;
    }
    .toggle input:checked + .slider { background: #00d2d3; }
    .toggle input:checked + .slider::before { transform: translateX(16px); }

    /* ── Button ──────────────────────────────────── */
    .btn-save {
      width: 100%;
      padding: 13px;
      background: linear-gradient(135deg, #00b4b5, #0085c7);
      border: none;
      border-radius: 11px;
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      letter-spacing: 0.3px;
      box-shadow: 0 4px 16px rgba(0,180,181,0.3);
      transition: transform 0.15s, box-shadow 0.15s, opacity 0.15s;
    }
    .btn-save:hover  { transform: translateY(-1px); box-shadow: 0 6px 22px rgba(0,180,181,0.45); }
    .btn-save:active { transform: translateY(0);    box-shadow: 0 2px 8px  rgba(0,180,181,0.25); }

    /* ── Toast ───────────────────────────────────── */
    .toast {
      margin-top: 12px;
      padding: 9px 14px;
      border-radius: 8px;
      font-size: 12.5px;
      font-weight: 500;
      text-align: center;
      display: none;
      animation: fadeIn 0.2s ease;
    }
    .toast.success { background: rgba(46,204,113,0.15); color: #2ecc71; border: 1px solid rgba(46,204,113,0.25); }
    .toast.error   { background: rgba(231,76,60,0.15);  color: #e74c3c; border: 1px solid rgba(231,76,60,0.25); }
    @keyframes fadeIn { from { opacity:0; transform: translateY(4px); } to { opacity:1; transform: translateY(0); } }

    /* ── Footer ──────────────────────────────────── */
    .footer {
      padding: 8px 20px 13px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
    }
    .footer span { font-size: 10.5px; color: #3d4a5e; }
    .footer strong { color: #5a6a80; font-weight: 600; }
    .credit { font-size: 9px; color: #2a3244; letter-spacing: 0.2px; }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <div class="header-row">
      <div class="logo">CU</div>
      <div class="header-text">
        <h1>CU Auto Login</h1>
        <p>Chandigarh University</p>
      </div>
      <span class="status-badge inactive" id="statusBadge">Not Set</span>
    </div>
  </div>

  <!-- Body -->
  <div class="body">

    <!-- UID -->
    <div class="field-group">
      <label>Student UID</label>
      <div class="input-wrap">
        <span class="icon">🎓</span>
        <input type="text" id="uid" placeholder="e.g., 24BAI70609" autocomplete="off" spellcheck="false" />
      </div>
    </div>

    <!-- Password -->
    <div class="field-group">
      <label>Password</label>
      <div class="input-wrap">
        <span class="icon">🔒</span>
        <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password" />
        <button class="toggle-eye" id="togglePwd" title="Show/Hide">👁️</button>
      </div>
    </div>

    <!-- Sites -->
    <div class="section-title">Auto-Login Sites</div>
    <div class="sites">
      <div class="site-row">
        <div class="site-info">
          <div class="site-dot cuims"></div>
          <div>
            <div class="site-label">CUIMS Portal</div>
            <div class="site-url">students.cuchd.in</div>
          </div>
        </div>
        <label class="toggle">
          <input type="checkbox" id="toggleCUIMS" checked />
          <span class="slider"></span>
        </label>
      </div>
      <div class="site-row">
        <div class="site-info">
          <div class="site-dot lms"></div>
          <div>
            <div class="site-label">CU-LMS</div>
            <div class="site-url">lms.cuchd.in</div>
          </div>
        </div>
        <label class="toggle">
          <input type="checkbox" id="toggleLMS" checked />
          <span class="slider"></span>
        </label>
      </div>
    </div>

    <!-- Save button -->
    <button class="btn-save" id="saveBtn">Save & Enable</button>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

  </div>

  <!-- Footer -->
  <div class="footer">
    <span>Your credentials are stored <strong>locally on this device only</strong></span>
    <span class="credit">Made by Pradnyesh.K</span>
  </div>

  <script src="popup.js"></script>
</body>
</html>
